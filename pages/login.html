<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login / Sign Up - Sivakami Traders</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .auth-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      background: var(--bg-primary, #f5f5f5);
      padding: 4px;
      border-radius: var(--border-radius-md, 8px);
    }
    .auth-tab {
      flex: 1;
      padding: 10px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      background: transparent;
      color: var(--text-muted, #666);
      border-radius: var(--border-radius-sm, 6px);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .auth-tab.active {
      background: #ffffff;
      color: var(--primary-color, #ff6f00);
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .pw-input-wrapper {
      position: relative;
      width: 100%;
      display: flex;
      align-items: center;
    }
    .pw-input-wrapper input.form-control {
      width: 100%;
      padding-right: 60px !important;
      box-sizing: border-box;
    }
    .btn-toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      color: var(--primary-color, #ff6f00);
      padding: 4px 6px;
      border-radius: 4px;
      user-select: none;
      z-index: 5;
      line-height: 1;
      display: flex;
      align-items: center;
    }
    .btn-toggle-pw:hover {
      background: rgba(255, 111, 0, 0.1);
    }
  </style>
</head>
<body class="login-body">
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">
          <div id="logo-wrapper" style="display:flex;align-items:center;justify-content:center;margin-bottom:12px;">
            <img src="../assets/logo.png" alt="Sivakami Traders" id="main-logo"
                 style="max-height:70px;display:none;"
                 onload="this.style.display='block';document.getElementById('logo-fallback').style.display='none';"
                 onerror="this.style.display='none';document.getElementById('logo-fallback').style.display='flex';">
            <div id="logo-fallback" style="display:flex;flex-direction:column;align-items:center;gap:4px;">
              <div style="width:72px;height:72px;background:var(--primary-color);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:32px;color:#fff;font-weight:900;font-family:'Outfit',sans-serif;box-shadow:0 4px 20px rgba(255,111,0,0.4);">ST</div>
            </div>
          </div>
        </div>
        <h1 style="font-size:24px;font-weight:800;color:var(--text-main);font-family:'Outfit',sans-serif;margin-bottom:4px;">Sivakami Traders</h1>
        <p class="login-subtitle">Cement &amp; Raw Materials Inventory</p>
        <p style="font-size:12px;color:var(--cement-grey);margin-top:4px;" id="auth-title-sub">Admin Control Panel</p>
      </div>

      <!-- AUTH TABS -->
      <div class="auth-tabs">
        <button type="button" class="auth-tab active" id="tab-login">Sign In</button>
        <button type="button" class="auth-tab" id="tab-register">Create Account</button>
      </div>

      <div id="alert-box" style="display:none;padding:12px;margin-bottom:16px;border-radius:var(--border-radius-md);font-size:13px;font-weight:600;text-align:center;"></div>

      <!-- SIGN IN FORM -->
      <form id="login-form">
        <div class="form-group">
          <label for="username"> Username</label>
          <input type="text" id="username" class="form-control" placeholder="Enter username" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password"> Password</label>
          <div class="pw-input-wrapper">
            <input type="password" id="password" class="form-control" placeholder="Enter password" required autocomplete="current-password">
            <button type="button" class="btn-toggle-pw" data-target="password">Show</button>
          </div>
        </div>
        <button type="submit" id="login-btn" class="btn btn-primary" style="width:100%;margin-top:10px;padding:14px;font-size:15px;letter-spacing:0.5px;">
          Sign In
        </button>
      </form>

      <!-- REGISTER FORM -->
      <form id="register-form" style="display:none;">
        <div class="form-group">
          <label for="reg-name"> Full Name *</label>
          <input type="text" id="reg-name" class="form-control" placeholder="e.g. Sabarish Naveen" required>
        </div>
        <div class="form-group">
          <label for="reg-username"> Username *</label>
          <input type="text" id="reg-username" class="form-control" placeholder="Choose username" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="reg-password"> Password *</label>
          <div class="pw-input-wrapper">
            <input type="password" id="reg-password" class="form-control" placeholder="Create password (min 4 chars)" required autocomplete="new-password">
            <button type="button" class="btn-toggle-pw" data-target="reg-password">Show</button>
          </div>
        </div>
        <div class="form-group">
          <label for="reg-confirm-password"> Confirm Password *</label>
          <div class="pw-input-wrapper">
            <input type="password" id="reg-confirm-password" class="form-control" placeholder="Re-enter password" required autocomplete="new-password">
            <button type="button" class="btn-toggle-pw" data-target="reg-confirm-password">Show</button>
          </div>
        </div>
        <button type="submit" id="register-btn" class="btn btn-primary" style="width:100%;margin-top:10px;padding:14px;font-size:15px;letter-spacing:0.5px;">
          Create New Account
        </button>
      </form>
    </div>
  </div>

  <script src="../js/login.js"></script>
</body>
</html>
